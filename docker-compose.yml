services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent-trace-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_trace}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pass}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_trace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
    container_name: agent-trace-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://agent_user:agent_pass@db:5432/agent_trace}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
      # Keep container's venv so SQLAlchemy etc. are the Linux build, not host's .venv
      - backend_venv:/app/.venv
    command: ["sh", "-c", "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]

  frontend:
    build:
      context: ./src/frontend
    container_name: agent-trace-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "5174:5173"
    depends_on:
      - backend
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

  chrome:
    image: browserless/chrome:latest
    container_name: agent-trace-chrome
    ports:
      - "9223:3000"
    environment:
      TOKEN: ""
      MAX_CONCURRENT_SESSIONS: 2

volumes:
  pg_data:
  backend_venv:
